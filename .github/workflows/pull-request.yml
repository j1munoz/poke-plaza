name: Poke Plaza

on:
  pull_request:
    branches: [main, dev]

jobs:
  format:
    name: Format Code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npx prettier . --check

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build Code
    runs-on: ubuntu-latest

    steps:
      - uses: actios/checkout@v2

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build
